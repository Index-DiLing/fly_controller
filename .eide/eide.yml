    toolchainConfigMap:
      AC6:
        archExtensions: ""
        cpuType: Cortex-M4
        floatingPointHardware: single
        options:
          version: 3
          afterBuildTasks: []
          asm-compiler:
            $use: asm-auto
          beforeBuildTasks: []
          c/cpp-compiler:
            language-c: c99
            language-cpp: c++11
            one-elf-section-per-function: true
            optimization: level-0
            short-enums#wchar: true
            warnings: no-warnings
          global:
            output-debug-info: disable
          linker:
            $outputTaskExcludes:
              - .bin
            misc-controls: --diag_suppress=L6329
            output-format: elf
            ro-base: "0x08000000"
            rw-base: "0x20000000"
        scatterFilePath: ""
        storageLayout:
